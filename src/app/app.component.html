<ion-app>
  <!-- Sidebar Overlay -->
  <div
    *ngIf="sidebarOpen"
    class="sidebar-overlay"
    (click)="closeSidebar()"
  ></div>

  <!-- Custom Sidebar -->
  <aside
    class="custom-sidebar"
    [class.open]="sidebarOpen"
  >
    <ion-header>
      <ion-toolbar>
        <ion-title>Menu</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closeSidebar()" fill="clear">
            <ion-icon name="close" slot="only-icon" color="light"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        <ion-item
          [routerLink]="'/home'"
          routerDirection="root"
          routerLinkActive="active"
          class="menu-item"
          (click)="closeSidebar()"
        >
          <ion-icon name="people" slot="start" color="primary"></ion-icon>
          <ion-label>Kontak</ion-label>
        </ion-item>

        <ion-item
          [routerLink]="'/labels'"
          routerDirection="root"
          routerLinkActive="active"
          class="menu-item"
          (click)="closeSidebar()"
        >
          <ion-icon name="pricetag" slot="start" color="primary"></ion-icon>
          <ion-label>Label</ion-label>
        </ion-item>

        <ion-item
          [routerLink]="'/favorites'"
          routerDirection="root"
          routerLinkActive="active"
          class="menu-item"
          (click)="closeSidebar()"
        >
          <ion-icon name="star" slot="start" color="warning"></ion-icon>
          <ion-label>Favorit</ion-label>
        </ion-item>

        <ion-item-divider></ion-item-divider>

        <ion-item
          [routerLink]="'/settings'"
          routerDirection="root"
          routerLinkActive="active"
          class="menu-item"
          (click)="closeSidebar()"
        >
          <ion-icon name="settings" slot="start" color="medium"></ion-icon>
          <ion-label>Pengaturan</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </aside>

  <ion-router-outlet></ion-router-outlet>
</ion-app>
