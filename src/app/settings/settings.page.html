<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" color="light"></ion-back-button>
      <ion-button (click)="openMenu()" fill="clear" color="light">
        <ion-icon slot="icon-only" name="menu"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Pengaturan</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list-header>
    <ion-label>Tampilan</ion-label>
  </ion-list-header>

  <ion-list inset="true">
    <ion-item>
      <ion-icon name="moon" slot="start" color="primary"></ion-icon>
      <ion-label>Mode Tema</ion-label>
      <ion-select [value]="currentTheme" (ionChange)="changeTheme($event)" justify="end" interface="popover">
        <ion-select-option value="light">Terang</ion-select-option>
        <ion-select-option value="dark">Gelap</ion-select-option>
        <ion-select-option value="system">Sesuai Perangkat</ion-select-option>
      </ion-select>
    </ion-item>
  </ion-list>

  <ion-list-header>
    <ion-label>Data & Cadangan</ion-label>
  </ion-list-header>

  <ion-list inset="true">
    <ion-item button (click)="onExport()">
      <ion-icon name="download" slot="start" color="success"></ion-icon>
      <ion-label>
        <h2>Export Kontak</h2>
        <p>Simpan semua kontak ke file JSON</p>
      </ion-label>
    </ion-item>

    <ion-item button (click)="fileInput.click()">
      <ion-icon name="cloud-upload" slot="start" color="tertiary"></ion-icon>
      <ion-label>
        <h2>Import Kontak</h2>
        <p>Muat kontak dari file cadangan</p>
      </ion-label>
      <input #fileInput type="file" (change)="onImport($event)" accept=".json" hidden>
    </ion-item>
  </ion-list>

  <div class="ion-padding footer-info">
    <p class="ion-text-center">Aplikasi Manajemen Kontak v1.0</p>
    <p class="ion-text-center subtitle">Tugas UTS Pemrograman Mobile</p>
  </div>
</ion-content>
